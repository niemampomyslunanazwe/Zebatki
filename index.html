<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kurs Rysowania Zębatek</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #c0c0c0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 40px;
            font-family: 'Segoe UI', 'Arial', sans-serif;
        }

        .card {
            max-width: 900px;
            width: 100%;
            background: white;
            padding: 30px 35px 35px 35px;
        }

        h1 {
            font-size: 42px;
            font-weight: 800;
            font-family: 'Arial Black', 'Segoe UI', sans-serif;
            color: black;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        .top-row {
            display: flex;
            gap: 50px;
            margin-bottom: 35px;
            flex-wrap: wrap;
        }

        .colors-section {
            flex: 1;
            min-width: 180px;
        }

        .colors-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 12px;
            color: black;
        }

        .color-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .color-row {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .color-square {
            width: 32px;
            height: 32px;
            border: 1px solid #888;
        }

        .color-name {
            font-size: 15px;
            font-weight: 500;
            color: black;
        }

        .white-bg { background-color: #FFFFFF; }
        .black-bg { background-color: #000000; }
        .gray-bg { background-color: #9E9E9E; }
        .brown-bg { background-color: #8B5A2B; }
        .yellow-bg { background-color: #F5C542; }

        .image-section {
            flex: 1;
            min-width: 200px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .gear-image {
            max-width: 100%;
            height: auto;
            display: block;
        }

        .author {
            font-size: 18px;
            font-weight: 700;
            color: black;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>KURS RYSOWANIA ZĘBATEK</h1>

        <div class="top-row">
            <div class="colors-section">
                <div class="colors-title">Lista użytych kolorów:</div>
                <div class="color-list">
                    <div class="color-row">
                        <div class="color-square white-bg"></div>
                        <span class="color-name">Biały</span>
                    </div>
                    <div class="color-row">
                        <div class="color-square black-bg"></div>
                        <span class="color-name">Czarny</span>
                    </div>
                    <div class="color-row">
                        <div class="color-square gray-bg"></div>
                        <span class="color-name">Szary</span>
                    </div>
                    <div class="color-row">
                        <div class="color-square brown-bg"></div>
                        <span class="color-name">Brązowy</span>
                    </div>
                    <div class="color-row">
                        <div class="color-square yellow-bg"></div>
                        <span class="color-name">Żółty</span>
                    </div>
                </div>
            </div>

            <div class="image-section">
                <img src="zebatki.png" alt="Zębatki" class="gear-image">
            </div>
        </div>

        <div class="author">AUTOR : PATRYK MIKA</div>
    </div>
</body>
</html>
