<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kurs Rysowania Zębatek</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #d9d9d9;
            font-family: 'Segoe UI', 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 40px;
        }

        .card {
            max-width: 750px;
            width: 100%;
            background: white;
            padding: 35px 40px 40px 40px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        h1 {
            font-size: 38px;
            font-weight: 800;
            font-family: 'Segoe UI', 'Arial Black', sans-serif;
            color: black;
            margin-bottom: 30px;
            letter-spacing: 0.5px;
        }

        .colors-label {
            font-size: 16px;
            font-weight: 600;
            color: #222;
            margin-bottom: 12px;
        }

        .colors-row {
            display: flex;
            flex-wrap: wrap;
            gap: 28px;
            align-items: center;
            margin-bottom: 35px;
        }

        .color-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        .circle {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            border: 1px solid #bbb;
        }

        .color-name {
            font-size: 13px;
            font-weight: 500;
            color: #1a1a1a;
            text-transform: uppercase;
        }

        .white { background-color: #FFFFFF; border: 1px solid #999; }
        .black { background-color: #000000; }
        .gray { background-color: #9E9E9E; }
        .brown { background-color: #8B5A2B; }
        .yellow { background-color: #F5C542; }

        .image-container {
            margin: 20px 0 30px 0;
            text-align: center;
        }

        .gear-image {
            max-width: 100%;
            height: auto;
            display: block;
        }

        .author {
            font-size: 18px;
            font-weight: 700;
            color: black;
            margin-top: 15px;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>KURS RYSOWANIA ZĘBATEK</h1>

        <div class="colors-label">Lista użytych kolorów:</div>
        <div class="colors-row">
            <div class="color-box">
                <div class="circle white"></div>
                <span class="color-name">Biały</span>
            </div>
            <div class="color-box">
                <div class="circle black"></div>
                <span class="color-name">Czarny</span>
            </div>
            <div class="color-box">
                <div class="circle gray"></div>
                <span class="color-name">Szary</span>
            </div>
            <div class="color-box">
                <div class="circle brown"></div>
                <span class="color-name">Brązowy</span>
            </div>
            <div class="color-box">
                <div class="circle yellow"></div>
                <span class="color-name">Żółty</span>
            </div>
        </div>

        <div class="image-container">
            <img src="zebatki.png" alt="Zębatki" class="gear-image">
        </div>

        <div class="author">AUTOR : PATRYK MIKA</div>
    </div>
</body>
</html>
