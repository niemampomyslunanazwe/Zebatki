<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kurs Rysowania Zębatek</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #b0b0b0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Arial', 'Segoe UI', sans-serif;
            padding: 40px;
        }

        .container {
            background: white;
            width: 650px;
            padding: 40px 50px 45px 50px;
        }

        h1 {
            font-size: 36px;
            font-weight: 800;
            font-family: 'Arial Black', 'Arial', sans-serif;
            color: black;
            margin-bottom: 35px;
            text-align: left;
        }

        .colors-row {
            display: flex;
            gap: 30px;
            margin-bottom: 35px;
            flex-wrap: wrap;
        }

        .color-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .color-square {
            width: 30px;
            height: 30px;
            border: 1px solid #888;
        }

        .color-name {
            font-size: 14px;
            font-weight: 500;
            color: black;
        }

        .white-bg { background-color: #FFFFFF; }
        .black-bg { background-color: #000000; }
        .gray-bg { background-color: #9E9E9E; }
        .brown-bg { background-color: #8B5A2B; }
        .yellow-bg { background-color: #F5C542; }

        .image-wrapper {
            margin-bottom: 35px;
            text-align: center;
        }

        .gear-image {
            max-width: 100%;
            height: auto;
            display: block;
        }

        .author {
            font-size: 16px;
            font-weight: 700;
            color: black;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>KURS RYSOWANIA ZĘBATEK</h1>

        <div class="colors-row">
            <div class="color-item">
                <div class="color-square white-bg"></div>
                <span class="color-name">Biały</span>
            </div>
            <div class="color-item">
                <div class="color-square black-bg"></div>
                <span class="color-name">Czarny</span>
            </div>
            <div class="color-item">
                <div class="color-square gray-bg"></div>
                <span class="color-name">Szary</span>
            </div>
            <div class="color-item">
                <div class="color-square brown-bg"></div>
                <span class="color-name">Brązowy</span>
            </div>
            <div class="color-item">
                <div class="color-square yellow-bg"></div>
                <span class="color-name">Żółty</span>
            </div>
        </div>

        <div class="image-wrapper">
            <img src="zebatki.png" alt="Zębatki" class="gear-image">
        </div>

        <div class="author">AUTOR : PATRYK MIKA</div>
    </div>
</body>
</html>
