<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Kurs rysowania zębatek</title>
<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background-color: #ccc;
    }

    .container {
        width: 900px;
        margin: 20px auto;
        border: 4px solid #ddd;
        background-color: white;
    }

    .header {
        background-color: #4b5d7a;
        color: #f0e6a6;
        text-align: center;
        padding: 15px;
        font-size: 22px;
        font-weight: bold;
        letter-spacing: 2px;
    }

    .content {
        display: flex;
        background: linear-gradient(to right, #5fa1cc 50%, #7fb1d4 50%);
        padding: 30px;
    }

    .left {
        width: 50%;
        color: white;
        font-size: 18px;
    }

    .left ul {
        margin-top: 15px;
    }

    .left li {
        margin-bottom: 8px;
    }

    .right {
        width: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .right img {
        width: 300px;
        height: auto;
        background-color: #eee;
        padding: 10px;
    }

    .footer {
        background-color: #4b5d7a;
        color: #f0e6a6;
        text-align: right;
        padding: 10px 20px;
        font-size: 14px;
    }
</style>
</head>

<body>

<div class="container">

    <div class="header">
        KURS RYSOWANIA ZĘBATEK
    </div>

    <div class="content">
        <div class="left">
            <p><strong>Lista użytych kolorów:</strong></p>
            <ul>
                <li>Biały</li>
                <li>Czarny</li>
                <li>Szary</li>
                <li>Brązowy</li>
                <li>Żółty</li>
            </ul>
        </div>

        <div class="right">
            <img src="zebatki.png" alt="Zębatki">
        </div>
    </div>

    <div class="footer">
        AUTOR : PATRYK MIKA
    </div>

</div>

</body>
</html>
